<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하루마다 - 공유 투두리스트</title>
    <style>
        /* 깔끔하고 감성적인 투두리스트 스타일링 */
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f8f9fa; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h1 { font-size: 24px; text-align: center; margin-bottom: 20px; color: #5a5a5a; }
        .room-box { background: #f1f3f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 14px; }
        .room-box button { background: #495057; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin: 5px; }
        .room-box input { padding: 5px; width: 120px; text-align: center; border: 1px solid #ced4da; border-radius: 4px; }
        .input-group { display: flex; margin-bottom: 20px; }
        .input-group input { flex: 1; padding: 10px; border: 1px solid #ced4da; border-radius: 4px 0 0 4px; outline: none; }
        .input-group button { background: #748ffc; color: white; border: none; padding: 10px 20px; border-radius: 0 4px 4px 0; cursor: pointer; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 12px; border-bottom: 1px solid #f1f3f5; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        li.completed span { text-decoration: line-through; color: #adb5bd; }
        .delete-btn { background: none; border: none; color: #ff6b6b; cursor: pointer; font-size: 16px; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // 사용자님의 Firebase 실제 설정값을 연동했습니다!
        const firebaseConfig = {
            apiKey: "AIzaSyAU4VGyDh27SHUqK_xC_rDi0v253oN98j8",
            authDomain: "todotodo-fe646.firebaseapp.com",
            projectId: "todotodo-fe646",
            storageBucket: "todotodo-fe646.firebasestorage.app",
            messagingSenderId: "756195710803",
            appId: "1:756195710803:web:551436b04af66d456733a6",
            measurementId: "G-SWNZLMJ0P4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentRoomCode = null;
        let unsubscribe = null;

        // 방 만들기
        window.createRoom = async function() {
            const randomCode = Math.floor(100000 + Math.random() * 900000).toString();
            currentRoomCode = randomCode;
            await setDoc(doc(db, "rooms", randomCode), { createdAt: new Date() });
            document.getElementById('room-info').innerText = `공유 코드: ${randomCode}`;
            listenToTodos(randomCode);
        };

        // 방 입장하기
        window.joinRoom = function() {
            const code = document.getElementById('room-input').value.trim();
            if (!code) return alert("코드를 입력해주세요.");
            currentRoomCode = code;
            document.getElementById('room-info').innerText = `접속된 방: ${code}`;
            listenToTodos(code);
        };

        // 실시간 투두리스트 불러오기 (핵심 기능)
        function listenToTodos(roomCode) {
            if (unsubscribe) unsubscribe();
            
            const q = query(collection(db, "rooms", roomCode, "todos"), orderBy("createdAt", "asc"));
            
            unsubscribe = onSnapshot(q, (snapshot) => {
                const listEl = document.getElementById('todo-list');
                listEl.innerHTML = '';
                
                snapshot.forEach((todoDoc) => {
                    const data = todoDoc.data();
                    const li = document.createElement('li');
                    if (data.completed) li.classList.add('completed');
                    
                    li.innerHTML = `
                        <span>${data.text}</span>
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteTodo('${todoDoc.id}')">×</button>
                    `;
                    
                    // 클릭 시 완료/미완료 토글
                    li.onclick = async () => {
                        await updateDoc(doc(db, "rooms", roomCode, "todos", todoDoc.id), {
                            completed: !data.completed
                        });
                    };
                    
                    listEl.appendChild(li);
                });
            });
        }

        // 투두 추가하기
        window.addTodo = async function() {
            const input = document.getElementById('todo-input');
            if (!currentRoomCode) return alert("방 생성 또는 입장을 먼저 해주세요!");
            if (!input.value.trim()) return;

            await addDoc(collection(db, "rooms", currentRoomCode, "todos"), {
                text: input.value.trim(),
                completed: false,
                createdAt: new Date()
            });
            input.value = '';
        };

        // 투두 삭제하기
        window.deleteTodo = async function(id) {
            if (confirm("삭제하시겠습니까?")) {
                await deleteDoc(doc(db, "rooms", currentRoomCode, "todos", id));
            }
        };
    </script>
</head>
<body>

<div class="container">
    <h1>하루마다 Todo</h1>
    
    <div class="room-box">
        <div id="room-info" style="font-weight: bold; margin-bottom: 10px; color: #4c6ef5;">코드를 생성하거나 입력하세요.</div>
        <button onclick="createRoom()">새 코드 생성</button>
        <div style="margin-top: 8px;">
            <input type="text" id="room-input" placeholder="코드 6자리">
            <button onclick="joinRoom()">입장</button>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="todo-input" placeholder="할 일을 입력하세요..." onkeypress="if(event.keyCode==13) addTodo()">
        <button onclick="addTodo()">추가</button>
    </div>

    <ul id="todo-list"></ul>
</div>

</body>
</html>
