<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하루마다 Todo</title>
    <style>
        /* 깔끔하고 감성적인 투두리스트 스타일링 */
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f8f9fa; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h1 { font-size: 24px; text-align: center; margin-bottom: 5px; color: #5a5a5a; }
        .sub-title { text-align: center; font-size: 13px; color: #4c6ef5; margin-bottom: 25px; font-weight: bold; }
        .input-group { display: flex; margin-bottom: 20px; }
        .input-group input { flex: 1; padding: 10px; border: 1px solid #ced4da; border-radius: 4px 0 0 4px; outline: none; }
        .input-group button { background: #748ffc; color: white; border: none; padding: 10px 20px; border-radius: 0 4px 4px 0; cursor: pointer; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 12px; border-bottom: 1px solid #f1f3f5; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        li.completed span { text-decoration: line-through; color: #adb5bd; }
        .delete-btn { background: none; border: none; color: #ff6b6b; cursor: pointer; font-size: 16px; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // 팩트 체크 완료된 사용자님의 고유 Firebase 정보입니다.
        const firebaseConfig = {
            apiKey: "AIzaSyAU4VGyDh27SHUqK_xC_rDi0v253oN98j8",
            authDomain: "todotodo-fe646.firebaseapp.com",
            projectId: "todotodo-fe646",
            storageBucket: "todotodo-fe646.firebasestorage.app",
            messagingSenderId: "756195710803",
            appId: "1:756195710803:web:551436b04af66d456733a6",
            measurementId: "G-SWNZLMJ0P4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 🔒 우리 둘만의 고정 비밀 공간 코드 (데이터베이스 저장 위치 이름입니다)
        const OUR_SECRET_CODE = "harumada_shared_room"; 

        // 페이지가 열리면 자동으로 둘만의 공유 공간으로 연결합니다.
        window.onload = async function() {
            await setDoc(doc(db, "rooms", OUR_SECRET_CODE), { createdAt: new Date() }, { merge: true });
            listenToTodos(OUR_SECRET_CODE);
        };

        // 서버의 투두리스트를 실시간으로 감시하여 화면에 바로 반영하는 함수
        function listenToTodos(roomCode) {
            const q = query(collection(db, "rooms", roomCode, "todos"), orderBy("createdAt", "asc"));
            
            onSnapshot(q, (snapshot) => {
                const listEl = document.getElementById('todo-list');
                listEl.innerHTML = '';
                
                snapshot.forEach((todoDoc) => {
                    const data = todoDoc.data();
                    const li = document.createElement('li');
                    if (data.completed) li.classList.add('completed');
                    
                    li.innerHTML = `
                        <span>${data.text}</span>
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteTodo('${todoDoc.id}')">×</button>
                    `;
                    
                    // 목록 클릭 시 완료 상태 실시간 토글
                    li.onclick = async () => {
                        await updateDoc(doc(db, "rooms", roomCode, "todos", todoDoc.id), {
                            completed: !data.completed
                        });
                    };
                    
                    listEl.appendChild(li);
                });
            });
        }

        // 투두 추가하기 (서버 데이터베이스로 바로 전송)
        window.addTodo = async function() {
            const input = document.getElementById('todo-input');
            if (!input.value.trim()) return;

            await addDoc(collection(db, "rooms", OUR_SECRET_CODE, "todos"), {
                text: input.value.trim(),
                completed: false,
                createdAt: new Date()
            });
            input.value = '';
        };

        // 투두 삭제하기 (서버 데이터베이스에서 제거)
        window.deleteTodo = async function(id) {
            if (confirm("삭제하시겠습니까?")) {
                await deleteDoc(doc(db, "rooms", OUR_SECRET_CODE, "todos", id));
            }
        };
    </script>
</head>
<body>

<div class="container">
    <h1>하루마다 Todo</h1>
    <div class="sub-title">🔒 실시간 공유 연동 중</div>

    <div class="input-group">
        <input type="text" id="todo-input" placeholder="할 일을 입력하세요..." onkeypress="if(event.keyCode==13) addTodo()">
        <button onclick="addTodo()">추가</button>
    </div>

    <ul id="todo-list"></ul>
</div>

</body>
</html>
